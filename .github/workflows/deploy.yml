name: Build and deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }} .
          docker tag ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }} ${{ vars.REGISTRY_URL }}/shower:latest
          docker push ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }}
          docker push ${{ vars.REGISTRY_URL }}/shower:latest

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }} \
            --container-registry-url https://${{ vars.REGISTRY_URL }} \
            --container-registry-user ${{ secrets.REGISTRY_USERNAME }} \
            --container-registry-password ${{ secrets.REGISTRY_PASSWORD }}
          az webapp restart --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP }}
