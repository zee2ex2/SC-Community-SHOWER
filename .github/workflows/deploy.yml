name: Build and deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - run: |
          docker build -t ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }} .
          docker tag ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }} ${{ vars.REGISTRY_URL }}/shower:latest
          docker push ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }}
          docker push ${{ vars.REGISTRY_URL }}/shower:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ vars.REGISTRY_URL }}/shower:${{ github.sha }}
